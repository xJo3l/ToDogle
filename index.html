        </div>
      </div>
      </div>
      <div class="list-color-line" style="background:${color}"></div>
    </div>
  `;

      let body = `<div class="list-content">`;
      if (col.items.length === 0) {
        if (addingTaskIn !== col.id) {
          body += `<div class="empty-state" style="padding:100px 20px;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <path d="M9 12l2 2 4-4"></path>
          <line x1="16" y1="8" x2="16" y2="8"></line>
          <line x1="8" y1="8" x2="8" y2="8"></line>
        </svg>
        <div style="color:#9b9b9b;font-size:14px;font-weight:500;margin-top:12px">This list is empty</div>
        <div style="color:#666;font-size:12px;margin-top:4px">Click + Add to create a group or task</div>
      </div>`;
        }
      } else {
        for (const item of col.items) body += renderItem(item, 0, col.id);
      }

      // Bottom adds
      if (addingTaskIn === col.id) {
        body += `<div class="inline-input-wrap" style="margin-top:16px">
      <input class="inline-input" data-task-input="${col.id}" data-container="${col.id}" data-col="${col.id}" placeholder="Task name…" autofocus>
      <div class="inline-cancel" data-action="cancel-task">×</div></div>`;
      } else {

      }

      body += `</div>`;
      return head + body;
    }

    function renderItem(item, depth, colId, filter, isHome = false) {
      if (item.itemType === 'task') return renderTaskNode(item, depth, colId, filter, isHome);
      return renderGroupNode(item, depth, colId, filter, isHome);
    }

    function renderTaskNode(task, depth, colId, filter, isHome = false) {
      if (!isTaskVisible(task, filter)) return '';
      if (task.archived) return '';
      let duChip = '';
      if (task.dueDate) duChip = `<span class="deadline-chip ${deadlineColor(task.dueDate)}">${formatDateShort(task.dueDate)}</span>`;
      const starActive = task.important ? ' active' : '';
      const isOvd = task.dueDate && parseDate(task.dueDate) < today();

      const compCls = task.completed ? ' completed' : '';
      const checkCls = task.completed ? 'task-checkbox checked' : 'task-checkbox';
      const textCls = task.completed ? 'task-text done' : 'task-text';

      if (isHome) {
        return `<div class="task-item${compCls}" data-task-id="${task.id}" style="padding:0;height:28px;background:transparent;border:none;">
    <div class="${checkCls}" data-action="toggle-task" data-id="${task.id}" data-col="${colId}" style="width:16px;height:16px;border-width:1.5px;font-size:10px">✓</div>
    <div class="task-info">
      <div style="display:flex;align-items:center;min-width:0;">
        <span class="${textCls}" style="font-size:13px;color:${task.completed ? '#555' : '#aaa'};display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(task.text)}</span>
        ${isOvd ? '<span class="overdue-dot" style="margin-right:8px;flex-shrink:0;"></span>' : ''}
        ${duChip ? `<div style="flex-shrink:0;">${duChip}</div>` : ''}
      </div>
    </div>
    <div class="task-actions">
      <div class="action-btn star${starActive}" data-action="toggle-important" data-id="${task.id}" data-col="${colId}" style="width:20px;height:20px;font-size:12px">★</div>
      <div class="action-btn" title="Set due date" style="width:20px;height:20px;font-size:12px" onclick="try{this.querySelector('input').showPicker()}catch(e){}">📅<input type="date" class="inline-due-input" data-action="due-change" data-id="${task.id}" data-col="${colId}" value="${task.dueDate || ''}"></div>
      <div class="action-btn trash" data-action="delete-task" data-id="${task.id}" data-col="${colId}" style="width:20px;height:20px;font-size:12px">×</div>
    </div>
  </div>`;
      }

      return `<div class="task-item${compCls}" data-task-id="${task.id}" draggable="true">
    <div class="${checkCls}" data-action="toggle-task" data-id="${task.id}" data-col="${colId}">✓</div>
    <div class="task-info">
      <div style="display:flex;align-items:center;min-width:0;">
        <span class="${textCls}">${escHtml(task.text)}</span>
        ${isOvd ? '<span class="overdue-dot" style="margin-right:8px;flex-shrink:0;"></span>' : ''}
        ${duChip ? `<div style="flex-shrink:0;">${duChip}</div>` : ''}
      </div>
    </div>
    <div class="task-actions">
      <div class="action-btn star${starActive}" data-action="toggle-important" data-id="${task.id}" data-col="${colId}">★</div>
      <div class="action-btn" title="Set due date" onclick="try{this.querySelector('input').showPicker()}catch(e){}">📅<input type="date" class="inline-due-input" data-action="due-change" data-id="${task.id}" data-col="${colId}" value="${task.dueDate || ''}"></div>
      <div class="action-btn trash" data-action="delete-task" data-id="${task.id}" data-col="${colId}">×</div>
    </div>
  </div>`;
    }

    function renderGroupNode(group, depth, colId, filter, isHome = false) {
      if (group.archived) return '';

      let childrenHtml = '';
      for (const c of (group.children || [])) childrenHtml += renderItem(c, depth + 1, colId, filter, isHome);

      if (filter && filter !== 'all' && childrenHtml === '') return '';

      const { completed, total } = getProgress(group, filter);
      const pPct = total > 0 ? (completed / total) * 100 : 0;
      const pColor = total === 0 ? '#2a2a2a' : 'rgba(255,255,255,0.4)';

      let chip = '';
      if (group.startDate || group.deadline) {
        let text = '';
        if (group.startDate && group.deadline) text = `${formatDateShort(group.startDate)} - ${formatDateShort(group.deadline)}`;
        else if (group.startDate) text = `Starts ${formatDateShort(group.startDate)}`;
        else text = `Due ${formatDateShort(group.deadline)}`;
        
        let clr = group.deadline ? deadlineColor(group.deadline) : 'gray'; 
        if (hasOverdueChild(group, filter)) clr = 'red';
        chip = `<span class="deadline-chip ${clr}">${text}</span>`;
      } else if (hasOverdueChild(group, filter)) {
        chip = `<span class="deadline-chip red">Overdue</span>`;
      }

      if (isHome) {
        const col = (filter && filter !== 'all') ? false : (group.homeCollapsed !== false);
        const arrow = col ? '▶' : '▼';
        return `
          <div class="home-group" data-group-id="${group.id}">
            <div style="cursor:pointer;display:flex;align-items:center;padding:6px 0;" data-action="toggle-home-group" data-id="${group.id}">
              <div style="font-size:10px;color:#555;width:16px;text-align:left;transition:transform 0.2s;flex-shrink:0;">${arrow}</div>
              <div style="font-size:14px;color:#ccc;font-weight:500;margin-left:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(group.name)}</div>
              ${chip ? `<div style="margin-left:8px;flex-shrink:0;">${chip}</div>` : ''}
            </div>
            ${!col ? `<div style="padding-left:16px;display:flex;flex-direction:column;gap:0;">${childrenHtml}</div>` : ''}
          </div>
        `;
      }

      const col = group.collapsed;
      if (addingTaskIn === group.id) {
        childrenHtml += `<div class="inline-input-wrap" style="padding:4px 14px">
      <input class="inline-input" data-task-input="${group.id}" data-container="${group.id}" data-col="${colId}" placeholder="Task name…" autofocus>
      <div class="inline-cancel" data-action="cancel-task">×</div></div>`;
      } else {
        childrenHtml += `<div class="add-btn-wrap" style="padding:4px 14px;">
      <div class="add-btn" data-action="show-add-task" data-target="${group.id}" data-col="${colId}" style="font-size:12px;padding:4px 10px">+ Add task</div>
      <div class="add-btn" data-action="show-add-group" data-target="${group.id}" data-col="${colId}" style="font-size:12px;padding:4px 10px">+ Add nested group</div>
    </div>`;
      }

      const badge = `<span class="type-badge ${group.type}" style="margin-left:8px">${group.type === 'persistent' ? 'STAYS' : 'AUTO-ARCHIVE'}</span>`;

      const inlineProg = `<div style="flex:1"></div><div style="width:40px;height:4px;border-radius:999px;background:#2a2a2a;overflow:hidden;flex-shrink:0"><div style="height:100%;width:${pPct}%;background:${pColor};transition:width 0.3s"></div></div><div style="font-size:11px;color:#555;margin-left:8px;font-weight:500;min-width:26px;text-align:right">${completed}/${total}</div>`;

      const completedTasksCount = countCompletedTasks(group);
      const isArchiveDisabled = completedTasksCount === 0 ? ' style="color:#444;pointer-events:none"' : '';

      return `
  <div class="toggle-group" data-group-id="${group.id}" draggable="true">
    <div class="toggle-header" data-action="toggle-collapse" data-id="${group.id}">
      <div class="toggle-arrow${col ? ' collapsed' : ''}" data-arrow-id="${group.id}">▼</div>
      <div class="toggle-name">${escHtml(group.name)}</div>
      ${badge}${chip}
      ${inlineProg}
      <div class="task-actions" style="opacity:1;margin-left:8px;position:relative;z-index:2">
        <div style="position:relative">
          <div class="action-btn" data-action="toggle-group-menu" data-id="${group.id}">⋯</div>
          <div class="group-dropdown" id="groupMenu-${group.id}">
            <div class="group-dropdown-item" onclick="try{this.querySelector('input').showPicker()}catch(e){}">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><line x1="12" y1="14" x2="12" y2="18"></line><line x1="10" y1="16" x2="14" y2="16"></line></svg>
              Set start date
              <input type="date" class="inline-due-input" data-action="start-change" data-id="${group.id}" data-col="${colId}" value="${group.startDate || ''}">
            </div>
            <div class="group-dropdown-item" onclick="try{this.querySelector('input').showPicker()}catch(e){}">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><circle cx="12" cy="16" r="3"></circle><path d="M12 14.5v1.5l1 1"></path></svg>
              Set deadline
              <input type="date" class="inline-due-input" data-action="due-change" data-id="${group.id}" data-col="${colId}" value="${group.deadline || ''}">
            </div>
            <div class="group-dropdown-divider"></div>
            <div class="group-dropdown-item${completedTasksCount === 0 ? ' disabled' : ''}" data-action="group-archive-completed" data-id="${group.id}" data-col="${colId}">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="5" x="2" y="3" rx="1"></rect><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"></path><path d="M10 12h4"></path></svg>
              Archive completed
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="toggle-content${col ? '' : ' expanded'}" data-content-id="${group.id}">
      <div class="toggle-inner"><div class="${depth >= 0 ? 'nested-indent' : ''}">${childrenHtml}</div></div>
    </div>
  </div>`;
    }

    function buildCompletedView() {
      let mainHtml = `<div class="flat-list" style="display:flex;flex-direction:column;gap:16px">`;
      let hasAny = false;

      state.columns.forEach(col => {
        let listHtml = `
          <div>
            <div style="font-size:13px;text-transform:uppercase;color:#555;font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
              <span>${escHtml(col.name)}</span>
              <div class="action-btn" data-action="clear-list-completed" data-col="${col.id}" style="width:auto;padding:0 8px;font-size:11px;color:#9b9b9b">Clear all</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:4px">`;
        
        let hasItemsInList = false;

        const gather = (items, pathStr) => {
          let html = '';
          items.forEach(i => {
            if (i.archived) {
              hasItemsInList = true;
              hasAny = true;
              if (i.itemType === 'group') {
                html += `<div class="toggle-group" style="margin-top:8px">
                  <div class="toggle-header" onclick="this.nextElementSibling.classList.toggle('expanded');this.querySelector('.toggle-arrow').classList.toggle('collapsed')">
                    <div class="toggle-arrow collapsed">▼</div>
                    <div class="toggle-name" style="text-decoration:line-through;color:#555">${escHtml(i.name)}</div>
                    <div class="action-btn trash" data-action="delete-archived" data-id="${i.id}" data-col="${col.id}" style="margin-left:auto;opacity:1;width:24px;height:24px;font-size:14px">×</div>
                  </div>
                  <div class="toggle-content">
                    <div class="toggle-inner"><div style="padding-left:24px;display:flex;flex-direction:column;gap:4px">`;
                const gatherTasks = (children) => {
                  let inner = '';
                  children.forEach(c => {
                    if (c.itemType === 'task') {
                      inner += `<div class="task-item" style="padding:4px 0;background:transparent;border:none"><div class="task-text done" style="color:#444">${escHtml(c.text)}</div></div>`;
                    } else if (c.itemType === 'group' && c.children) {
                      inner += gatherTasks(c.children);
                    }
                  });
                  return inner;
                };
                html += gatherTasks(i.children || []);
                html += `</div></div></div></div>`;
              } else {
                html += `<div class="task-item" style="padding:4px 0;background:transparent;border:none;justify-content:space-between">
                  <div style="display:flex;flex-direction:column;min-width:0">
                    <div class="task-text done" style="color:#444">${escHtml(i.text)}</div>
                    ${pathStr ? `<div style="font-size:11px;color:#333;margin-top:2px">${escHtml(pathStr)}</div>` : ''}
                  </div>
                  <div class="action-btn trash" data-action="delete-archived" data-id="${i.id}" data-col="${col.id}" style="opacity:1;flex-shrink:0;width:24px;height:24px;font-size:14px">×</div>
                </div>`;
              }
            } else if (i.itemType === 'group' && i.children) {
              html += gather(i.children, i.name);
            }
          });
          return html;
        };
        
        const itemsHtml = gather(col.items, '');
        if (hasItemsInList) {
          listHtml += itemsHtml + `</div></div>`;
          mainHtml += listHtml;
        }
      });

      if (!hasAny) mainHtml += `<div class="empty-state"><div class="empty-title" style="color:#9b9b9b">No completed tasks yet</div></div>`;
      mainHtml += `</div>`;

      let head = `<div class="view-header"><div style="display:flex;align-items:center;justify-content:space-between"><div class="view-title">✓ Completed</div></div></div>`;

      return head + mainHtml;
    }

    function buildTrashView() {
      let html = `<div class="view-header"><div style="display:flex;align-items:center;justify-content:space-between"><div class="view-title">🗑 Trash</div>
    ${state.trash.length > 0 ? `<button class="add-btn" data-action="empty-trash" style="color:#ef4444;border-color:#ef4444;margin:0;width:auto">Empty Trash</button>` : ''}
  </div></div><div class="flat-list" style="display:flex;flex-direction:column;gap:8px">`;
      if (state.trash.length === 0) {
        html += `<div class="empty-state"><div class="empty-title" style="color:#9b9b9b">Trash is empty</div></div>`;
      } else {
        state.trash.forEach((tItem, idx) => {
          const name = tItem.item.itemType === 'task' ? tItem.item.text : tItem.item.name;
          html += `<div class="task-item" style="border:1px solid #2e2e2e">
        <div class="task-info">
          <span class="task-text">${escHtml(name)}</span>
          <span class="task-bread">Deleted: ${formatDateShort(tItem.deletedAt)}</span>
        </div>
        <button class="add-btn" data-action="restore-trash" data-idx="${idx}" style="width:auto;margin:0;padding:6px 12px">Restore</button>
      </div>`;
        });
      }
      html += `</div>`;
      return html;
    }

    function render() {
      const sb = document.querySelector('.sidebar');
      if (state.sbCollapsed) sb.classList.add('collapsed'); else sb.classList.remove('collapsed');
      renderSidebar();
      renderMainContent();
    }

    /* ================================================================
       EVENTS
       ================================================================ */

    document.getElementById('calPopupClose').addEventListener('click', () => { document.getElementById('calPopup').classList.remove('show'); });

    document.addEventListener('click', e => {

      const btn = e.target.closest('[data-action]');
      if (e.target.closest('.sb-settings-icon') == null && e.target.closest('.settings-dropdown') == null) {
        document.getElementById('sbSettings')?.classList.remove('show');
      }
      if (!e.target.closest('.top-add-btn') && !e.target.closest('.list-more-btn') && !e.target.closest('.header-dropdown') && !e.target.closest('.sb-list-more') && !e.target.closest('.sb-dropdown') && !e.target.closest('.group-dropdown')) {
        document.querySelectorAll('.header-dropdown, .sb-dropdown, .group-dropdown').forEach(d => d.classList.remove('show'));
      }
      if (!btn) return;
      const a = btn.dataset.action;

      if (a === 'nav') {
        currentView = btn.dataset.view;
        render();
      }
      else if (a === 'set-home-filter') {
        homeFilter = btn.dataset.filter; render();
      }
      else if (a === 'toggle-home-group') {
        for (const col of state.columns) {
          const group = findById(col.items, btn.dataset.id);
          if (group) { group.homeCollapsed = (group.homeCollapsed === false ? true : false); saveState(); render(); break; }
        }
      }
      else if (a === 'toggle-list-add') {
        e.stopPropagation();
        document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show'));
        document.getElementById('addMenu-' + btn.dataset.id)?.classList.add('show');
      }
      else if (a === 'toggle-list-more') {
        e.stopPropagation();
        document.querySelectorAll('.header-dropdown').forEach(d => d.classList.remove('show'));
        document.getElementById('moreMenu-' + btn.dataset.id)?.classList.add('show');
      }
      else if (a === 'toggle-cal') {
        showMiniCal = !showMiniCal;
        renderSidebar();
      }
      else if (a === 'toggle-sb-collapse') {
        state.sbCollapsed = !state.sbCollapsed;
        saveState();
        const sb = document.querySelector('.sidebar');
        if (sb) {
          if (state.sbCollapsed) sb.classList.add('collapsed');
          else sb.classList.remove('collapsed');
        }
        renderSidebar(); // re-render to change chevron direction
      }
      else if (a === 'toggle-settings') {
        document.getElementById('sbSettings')?.classList.toggle('show');
      }
      else if (a === 'clear-data') {
        if (confirm('Wipe everything?')) { state = defaultState(); saveState(); currentView = 'home'; render(); }
      }
      else if (a === 'export-data') {
        const dataStr = JSON.stringify(state, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const aLink = document.createElement('a');
        aLink.href = url;
        const todayStr = new Date().toISOString().split('T')[0];
        aLink.download = `todogle-backup-${todayStr}.json`;
        aLink.click();
        URL.revokeObjectURL(url);
        showToast('Data exported successfully');
        document.getElementById('sbSettings').classList.remove('show');
      }
      else if (a === 'import-data') {
        const input = document.getElementById('importFile');
        input.onchange = (ev) => {
          const file = ev.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (re) => {
            try {
              const parsed = JSON.parse(re.target.result);
              if (!parsed || !Array.isArray(parsed.columns)) throw new Error('Invalid structure');
              if (confirm('This will replace all current data. Continue?')) {
                state = parsed;
                saveState();
                currentView = 'home';
                render();
                showToast('Data imported successfully');
              }
            } catch (err) {
              showToast('Invalid backup file', true);
            }
          };
          reader.readAsText(file);
          input.value = '';
        };
        input.click();
        document.getElementById('sbSettings').classList.remove('show');
      }
      else if (a === 'add-col') {
        addingColNew = true; renderSidebar();
      }
      else if (a === 'delete-col') {
        if (confirm('Delete entire list?')) {
          state.columns = state.columns.filter(c => c.id !== btn.dataset.col);
          currentView = 'home'; saveState(); render();
        }
      }
      else if (a === 'rename-col') {
        const colId = btn.dataset.col;
        const val = prompt('Rename to:');
        if (val) {
          const c = state.columns.find(x => x.id === colId);
          if (c) { c.name = val; saveState(); render(); }
        }
      }
      else if (a === 'toggle-task') {
        e.stopPropagation();
        const col = state.columns.find(c => c.id === btn.dataset.col);
        if (col) {
          const task = findById(col.items, btn.dataset.id);
          if (task) {
            task.completed = !task.completed;
            saveState();
            render();
          }
        }
      }
      else if (a === 'toggle-important') {
        const col = state.columns.find(c => c.id === btn.dataset.col);
        if (col) {
          const trg = findById(col.items, btn.dataset.id);
          if (trg) { trg.important = !trg.important; saveState(); render(); }
        }
      }
      else if (a === 'delete-task' || a === 'delete-group') {
        moveToTrash(btn.dataset.id, btn.dataset.col);
        render();
      }
      else if (a === 'show-add-task') {
        addingTaskIn = btn.dataset.target; render();
        setTimeout(() => document.querySelector(`[data-task-input="${btn.dataset.target}"]`)?.focus(), 150);
      }
      else if (a === 'clear-list-completed') {
        const colId = btn.dataset.col;
        const col = state.columns.find(c => c.id === colId);
        if (col && confirm(`Permanently delete all completed tasks from ${col.name}?`)) {
          const clean = (items) => items.filter(i => {
            if (i.archived) return false;
            if (i.itemType === 'group' && i.children) i.children = clean(i.children);
            return true;
          });
          col.items = clean(col.items);
          saveState(); render(); showToast('Cleared list history');
        }
      }
      else if (a === 'delete-archived') {
        const colId = btn.dataset.col;
        const id = btn.dataset.id;
        const col = state.columns.find(c => c.id === colId);
        if (col) {
          const recursivelyFindAndRemove = (items, targetId) => {
            const idx = items.findIndex(i => i.id === targetId);
            if (idx !== -1) { items.splice(idx, 1); return true; }
            for (const item of items) {
              if (item.itemType === 'group' && item.children) {
                if (recursivelyFindAndRemove(item.children, targetId)) return true;
              }
            }
            return false;
          };
          recursivelyFindAndRemove(col.items, id);
          saveState(); render();
        }
      }
      else if (a === 'cancel-task') {
        addingTaskIn = null; render();
      }
      else if (a === 'show-add-group') {
        modalTarget = { columnId: btn.dataset.col, parentId: btn.dataset.target };
        document.getElementById('modalName').value = '';
        document.getElementById('modalStartDate').value = '';
        document.getElementById('modalDeadline').value = '';
        document.getElementById('groupModal').classList.add('show');
        setTimeout(() => document.getElementById('modalName')?.focus(), 50);
      }
      else if (a === 'empty-trash') {
        if (confirm('Empty entire trash completely?')) { state.trash = []; saveState(); render(); }
      }
      else if (a === 'restore-trash') {
        const idx = parseInt(btn.dataset.idx);
        const tItem = state.trash[idx];
        if (tItem) {
          const col = state.columns.find(c => c.id === tItem.listId);
          if (col) {
            col.items.push(tItem.item);
            state.trash.splice(idx, 1);
            saveState(); render();
          } else alert('Original list deleted!');
        }
      }
      else if (a === 'ep-open') {
        e.stopPropagation();
        emojiPickerTargetCol = btn.dataset.col;
        const ep = document.getElementById('emojiPicker');
        if (!ep) {
          document.body.insertAdjacentHTML('beforeend', `
        <div id="emojiPicker">
          <input type="text" id="epSearch" class="ep-search" placeholder="Search emoji..." autocomplete="off">
          <div id="epGrid" class="ep-grid"></div>
        </div>
      `);
          document.getElementById('epSearch').addEventListener('input', ev => filterEmojiPicker(ev.target.value));
        }
        const realEp = document.getElementById('emojiPicker');
        const rect = btn.getBoundingClientRect();
        realEp.style.left = (rect.left) + 'px';
        realEp.style.top = (rect.bottom + 8) + 'px';
        realEp.classList.add('show');
        document.getElementById('epSearch').value = '';
        filterEmojiPicker('');
        setTimeout(() => document.getElementById('epSearch').focus(), 50);
      }
      else if (a === 'ep-select') {
        e.stopPropagation();
        if (emojiPickerTargetCol) {
          const c = state.columns.find(x => x.id === emojiPickerTargetCol);
          if (c) {
            c.icon = btn.dataset.emoji;
            saveState();
            renderSidebar();
          }
        }
        document.getElementById('emojiPicker').classList.remove('show');
      }
      else if (a === 'toggle-collapse') {
        const col = state.columns.find(c => c.id === btn.closest('[data-col]')?.dataset?.col || currentView); // rough fallback
        // Wait, the button has no colId if nested. Oh wait, renderGroupNode passes colId to the trash btn but not the toggle header...
        for (const cc of state.columns) {
          const grp = findById(cc.items, btn.dataset.id);
          if (grp) {
            grp.collapsed = !grp.collapsed;
            saveState();
            const content = document.querySelector(`[data-content-id="${grp.id}"]`);
            const arrow = document.querySelector(`[data-arrow-id="${grp.id}"]`);
            if (content) content.classList.toggle('expanded', !grp.collapsed);
            if (arrow) arrow.classList.toggle('collapsed', grp.collapsed);
            break;
          }
        }
      }

      else if (a === 'toggle-sb-menu') {
        e.stopPropagation();
        document.querySelectorAll('.sb-dropdown, .header-dropdown, .settings-dropdown').forEach(d => d.classList.remove('show'));
        document.getElementById('sbMenu-' + btn.dataset.id)?.classList.add('show');
      }
      else if (a === 'toggle-group-menu') {
        e.stopPropagation();
        document.querySelectorAll('.sb-dropdown, .header-dropdown, .settings-dropdown, .group-dropdown').forEach(d => d.classList.remove('show'));
        document.getElementById('groupMenu-' + btn.dataset.id)?.classList.add('show');
      }
      else if (a === 'group-archive-completed') {
        const colId = btn.dataset.col;
        const groupId = btn.dataset.id;
        const col = state.columns.find(c => c.id === colId);
        if (col) {
          const group = findById(col.items, groupId);
          if (group) {
            let count = 0;
            if (group.type === 'ephemeral' && isGroupComplete(group, 'all')) {
              count = countCompletedTasks(group);
              group.archived = true;
            } else {
              const archiveRecursive = (items) => {
                for (const item of items) {
                  if (item.itemType === 'task' && item.completed && !item.archived) {
                    item.archived = true;
                    count++;
                  } else if (item.itemType === 'group' && !item.archived) {
                    archiveRecursive(item.children || []);
                  }
                }
              };
              archiveRecursive(group.children || []);
            }
            if (count > 0) {
              saveState();
              render();
              showToast(`${count} tasks archived`);
            }
          }
        }
      }
      else if (a === 'sb-rename') {
        e.stopPropagation();
        const colId = btn.dataset.id;
        const item = btn.closest('.sb-list-item');
        const nameSpan = item.querySelector('.sb-list-name-txt');
        const oldName = state.columns.find(c => c.id === colId).name;
        nameSpan.innerHTML = `<input type="text" class="sb-rename-input" value="${escHtml(oldName)}" style="width:100%;color:#fff;background:#222;border:none;outline:none;padding:2px 4px;border-radius:4px" autofocus>`;
        const inp = nameSpan.querySelector('input');
        inp.addEventListener('keydown', ev => {
          if (ev.key === 'Enter') {
            const c = state.columns.find(x => x.id === colId);
            if (c) { c.name = ev.target.value.trim() || c.name; saveState(); renderSidebar(); if (currentView === colId) render(); }
          }
          else if (ev.key === 'Escape') renderSidebar();
        });
        inp.addEventListener('click', ev => ev.stopPropagation());
        setTimeout(() => inp.focus(), 50);
        document.getElementById('sbMenu-' + colId).classList.remove('show');
        item.draggable = false; // Disable drag while editing
      }
      else if (a === 'sb-delete') {
        e.stopPropagation();
        const colId = btn.dataset.id;
        const dropdown = document.getElementById('sbMenu-' + colId);
        dropdown.innerHTML = `
      <div style="padding:8px 14px;font-size:12px;color:#ccc;white-space:nowrap">Delete this list?</div>
      <button class="sb-dropdown-btn" data-action="sb-delete-confirm" data-id="${colId}" style="color:#ef4444">Confirm</button>
      <button class="sb-dropdown-btn" onclick="renderSidebar()">Cancel</button>
    `;
      }
      else if (a === 'sb-delete-confirm') {
        e.stopPropagation();
        state.columns = state.columns.filter(c => c.id !== btn.dataset.id);
        if (currentView === btn.dataset.id) currentView = 'home';
        saveState(); render();
      }
      else if (a === 'sb-mark-imp') {
        e.stopPropagation();
        const c = state.columns.find(x => x.id === btn.dataset.id);
        if (c) { c.important = !c.important; saveState(); renderSidebar(); }
      }
      else if (a === 'cal-item-click') {
        e.stopPropagation();
        const p = document.getElementById('calPopup');
        document.getElementById('cpTitle').textContent = btn.dataset.name;
        document.getElementById('cpBread').textContent = btn.dataset.bread;
        document.getElementById('cpDate').textContent = "Due: " + btn.dataset.date;
        const rect = btn.getBoundingClientRect();
        p.style.left = Math.min(rect.right + 10, window.innerWidth - 260) + 'px';
        p.style.top = Math.max(10, rect.top - 20) + 'px';
        p.classList.add('show');
      }
      else if (a === 'cal-prev') { calendarDate.setMonth(calendarDate.getMonth() - 1); renderMainContent(); }
      else if (a === 'cal-next') { calendarDate.setMonth(calendarDate.getMonth() + 1); renderMainContent(); }
      else if (a === 'cal-today') { calendarDate = new Date(); renderMainContent(); }
      else if (a === 'cal-view-month') { calViewType = 'month'; renderMainContent(); }
      else if (a === 'cal-view-week') { calViewType = 'week'; renderMainContent(); }
      else if (a === 'cal-view-day') { calViewType = 'day'; renderMainContent(); }

    });

    document.addEventListener('change', e => {
      if (e.target.dataset.action === 'due-change') {
        const col = state.columns.find(c => c.id === e.target.dataset.col);
        if (col) {
          const trg = findById(col.items, e.target.dataset.id);
          if (trg) { 
            if (trg.itemType === 'group') {
              trg.deadline = e.target.value || null;
            } else {
              trg.dueDate = e.target.value || null; 
            }
            saveState(); render(); 
          }
        }
      } else if (e.target.dataset.action === 'start-change') {
        const col = state.columns.find(c => c.id === e.target.dataset.col);
        if (col) {
          const trg = findById(col.items, e.target.dataset.id);
          if (trg) { 
            if (trg.itemType === 'group') trg.startDate = e.target.value || null;
            saveState(); render(); 
          }
        }
      }
    });

    document.addEventListener('keydown', e => {
      if (addingColNew && e.target.id === 'newColInput') {
        if (e.key === 'Enter') {
          const v = e.target.value.trim();
          if (v) { state.columns.push({ id: generateId(), name: v, items: [] }); saveState(); }
          addingColNew = false; render();
        }
        if (e.key === 'Escape') { addingColNew = false; render(); }
      }
      else if (addingTaskIn && e.target.classList.contains('inline-input')) {
        if (e.key === 'Enter') {
          const v = e.target.value.trim();
          if (v) {
            const col = state.columns.find(c => c.id === e.target.dataset.col);
            if (col) {
              const nTask = { id: generateId(), itemType: 'task', text: v, completed: false, important: false, dueDate: null };
              if (e.target.dataset.container === col.id) col.items.push(nTask);
              else {
                const grp = findById(col.items, e.target.dataset.container);
                if (grp) grp.children.push(nTask);
              }
              saveState(); e.target.value = ''; 
              const targetId = e.target.dataset.container;
              render();
              setTimeout(() => document.querySelector(`[data-task-input="${targetId}"]`)?.focus(), 150);
            }
          }
        }
        if (e.key === 'Escape') { addingTaskIn = null; render(); }
      }
    });


    function insertItemRelative(items, targetId, insertAfter, newItem) {
      const idx = items.findIndex(i => i.id === targetId);
      if (idx !== -1) {
        items.splice(idx + (insertAfter ? 1 : 0), 0, newItem);
        return true;
      }
      for (const item of items) {
        if (item.itemType === 'group' && item.children) {
          if (insertItemRelative(item.children, targetId, insertAfter, newItem)) return true;
        }
      }
      return false;
    }

    let draggedColIdx = null;
    let draggedItemId = null;
    let draggedItemType = null;

    document.addEventListener('dragstart', e => {
      const taskItem = e.target.closest('.task-item');
      const groupItem = e.target.closest('.toggle-group');
      
      if (taskItem && taskItem.draggable) {
        draggedItemId = taskItem.dataset.taskId;
        draggedItemType = 'task';
        taskItem.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.stopPropagation();
        return;
      } else if (groupItem && groupItem.draggable) {
        draggedItemId = groupItem.dataset.groupId;
        draggedItemType = 'group';
        groupItem.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.stopPropagation();
        return;
      }

      const sbItem = e.target.closest('.sb-list-item');
      if (sbItem && sbItem.draggable) {
        draggedColIdx = parseInt(sbItem.dataset.index);
        sbItem.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      }
    });

    document.addEventListener('dragover', e => {
      const sbItem = e.target.closest('.sb-list-item');
      if (sbItem && draggedColIdx !== null && sbItem.draggable) {
        e.preventDefault();
        const rect = sbItem.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        if (e.clientY < mid) {
          sbItem.classList.add('drag-over-top');
          sbItem.classList.remove('drag-over-bottom');
        } else {
          sbItem.classList.add('drag-over-bottom');
          sbItem.classList.remove('drag-over-top');
        }
        return;
      }

      if (draggedItemId !== null) {
        e.preventDefault();
        const dropTarget = e.target.closest('.task-item') || e.target.closest('.toggle-group');
        if (dropTarget && dropTarget.dataset.taskId !== draggedItemId && dropTarget.dataset.groupId !== draggedItemId) {
          // Check if dropping into itself
          const draggedEl = document.querySelector('.dragging');
          if (draggedEl && draggedEl.contains(dropTarget)) return;

          const rect = dropTarget.getBoundingClientRect();
          const mid = rect.top + rect.height / 2;
          if (e.clientY < mid) {
            dropTarget.classList.add('drag-over-top');
            dropTarget.classList.remove('drag-over-bottom');
          } else {
            dropTarget.classList.add('drag-over-bottom');
            dropTarget.classList.remove('drag-over-top');
          }
        }
      }
    });

    document.addEventListener('dragleave', e => {
      const sbItem = e.target.closest('.sb-list-item');
      if (sbItem && sbItem.draggable) {
        sbItem.classList.remove('drag-over-top', 'drag-over-bottom');
      }
      const dropTarget = e.target.closest('.task-item') || e.target.closest('.toggle-group');
      if (dropTarget) {
        dropTarget.classList.remove('drag-over-top', 'drag-over-bottom');
      }
    });

    document.addEventListener('drop', e => {
      const sbItem = e.target.closest('.sb-list-item');
      if (sbItem && sbItem.draggable && draggedColIdx !== null) {
        e.preventDefault();
        sbItem.classList.remove('drag-over-top', 'drag-over-bottom');
        const targetIdx = parseInt(sbItem.dataset.index);
        const rect = sbItem.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        let insertIdx = e.clientY < mid ? targetIdx : targetIdx + 1;

        if (draggedColIdx < insertIdx) insertIdx--;

        if (draggedColIdx !== insertIdx) {
          const col = state.columns.splice(draggedColIdx, 1)[0];
          state.columns.splice(insertIdx, 0, col);
          saveState();
          renderSidebar();
        }
        return;
      }

      if (draggedItemId !== null) {
        e.preventDefault();
        const dropTarget = e.target.closest('.task-item') || e.target.closest('.toggle-group');
        if (dropTarget) {
          dropTarget.classList.remove('drag-over-top', 'drag-over-bottom');
          const targetId = dropTarget.dataset.taskId || dropTarget.dataset.groupId;
          
          const draggedEl = document.querySelector('.dragging');
          if (draggedEl && draggedEl.contains(dropTarget)) return;

          if (targetId && targetId !== draggedItemId) {
            const rect = dropTarget.getBoundingClientRect();
            const mid = rect.top + rect.height / 2;
            const insertAfter = e.clientY >= mid;
            
            // Search all lists for the item
            let foundItem = null;
            let sourceCol = null;
            
            for (const c of state.columns) {
              const item = extractById(c.items, draggedItemId);
              if (item) {
                foundItem = item;
                sourceCol = c;
                break;
              }
            }

            if (foundItem) {
              // Now find target in current view or all lists
              // Assuming it's dropped in the same column as we only render current column.
              const col = state.columns.find(c => c.id === currentView);
              if (col) {
                if (!insertItemRelative(col.items, targetId, insertAfter, foundItem)) {
                  // Fallback push to end if not found
                  col.items.push(foundItem);
                }
              } else if (sourceCol) {
                 // if we are in 'home' view, currentView is 'home'.
                 // Let's try to find by targetId across all columns.
                 let placed = false;
                 for (const c of state.columns) {
                   if (insertItemRelative(c.items, targetId, insertAfter, foundItem)) {
                     placed = true;
                     break;
                   }
                 }
                 if (!placed) sourceCol.items.push(foundItem);
              }
              saveState();
              render();
            }
          }
        }
      }
    });

    document.addEventListener('dragend', e => {
      const item = e.target.closest('.sb-list-item');
      if (item) item.classList.remove('dragging');
      document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
      document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => el.classList.remove('drag-over-top', 'drag-over-bottom'));
      draggedColIdx = null;
      draggedItemId = null;
      draggedItemType = null;
    });



    // Modal Logic
    document.getElementById('modalCancel').addEventListener('click', () => { document.getElementById('groupModal').classList.remove('show'); });
    document.querySelectorAll('.modal-type-btn').forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('.modal-type-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }));
    document.getElementById('modalCreate').addEventListener('click', () => {
      const name = document.getElementById('modalName').value.trim();
      if (!name || !modalTarget) return;
      const type = document.querySelector('input[name="modalType"]:checked')?.value || 'persistent';
      const nGrp = { id: generateId(), itemType: 'group', name, type, startDate: document.getElementById('modalStartDate').value || null, deadline: document.getElementById('modalDeadline').value || null, collapsed: false, children: [] };
      const col = state.columns.find(c => c.id === modalTarget.columnId);
      if (col) {
        if (modalTarget.parentId === modalTarget.columnId) col.items.push(nGrp);
        else { const p = findById(col.items, modalTarget.parentId); if (p) p.children.push(nGrp); }
        saveState(); render();
      }
      document.getElementById('groupModal').classList.remove('show');
    });

    loadState();
    render();


    // Handle outside click cancels for inline edits
    function cancelActiveInput() {
      let changed = false;
      if (document.querySelector('.sb-rename-input')) changed = true;
      if (addingColNew) { addingColNew = false; changed = true; }
      if (addingTaskIn) { addingTaskIn = null; changed = true; }
      return changed;
    }

    document.addEventListener('mousedown', e => {
      if (e.target.closest('.sb-rename-input') || e.target.closest('#newColInput') || e.target.closest('.inline-input-wrap') || e.target.closest('.top-add-btn') || e.target.closest('.add-btn')) {
        return;
      }
      if (document.querySelector('.sb-rename-input') || document.getElementById('newColInput') || addingTaskIn) {
        if (cancelActiveInput()) {
          render();
        }
      }
      if (!e.target.closest('.cal-task-chip') && !e.target.closest('#calPopup')) {
        document.getElementById('calPopup')?.classList.remove('show');
      }
      if (document.getElementById('emojiPicker')?.classList.contains('show') && !e.target.closest('#emojiPicker') && !e.target.closest('[data-action="ep-open"]')) {
        document.getElementById('emojiPicker').classList.remove('show');
      }
    });


    function showToast(msg, isErr = false) {
      let tc = document.getElementById('toast-container');
      if (!tc) {
        tc = document.createElement('div');
        tc.id = 'toast-container';
        document.body.appendChild(tc);
      }
      const t = document.createElement('div');
      t.className = 'toast' + (isErr ? ' error' : '');
      t.textContent = msg;
      tc.appendChild(t);
      setTimeout(() => { t.style.opacity = '1'; t.style.transform = 'translateY(0)'; }, 10);
      setTimeout(() => {
        t.style.opacity = '0';
        setTimeout(() => { t.remove(); }, 300);
      }, 2500);
    }

  </script>
</body>

</html>
