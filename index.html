<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDogle</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <svg style="width:0;height:0;position:absolute;">
    <defs>
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#4A9EFF" />
        <stop offset="100%" stop-color="#8B5CF6" />
      </linearGradient>
      <linearGradient id="ringGradGreen" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#10B981" />
        <stop offset="100%" stop-color="#34D399" />
      </linearGradient>
    </defs>
  </svg>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <!-- Rendered by JS -->
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <button class="floating-toggle" data-action="toggle-sb-collapse">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
    <main class="main-content" id="mainContent">
      <!-- Rendered by JS -->
    </main>
    <nav class="bottom-nav" id="bottomNav">
      <!-- Rendered by JS on mobile -->
    </nav>
    <button class="fab" id="fab" data-action="show-add-task-modal">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </button>
  </div>

  <div class="modal-overlay" id="groupModal">
    <div class="modal">
      <h3>Create Group</h3>
      <div class="modal-field">
        <label>Name</label>
        <input type="text" id="modalName" placeholder="Group name…">
      </div>
      <div class="modal-field">
        <label>Type</label>
        <div class="modal-type-btns" style="display:flex;flex-direction:column;gap:12px">
          <label style="cursor:pointer;display:flex;gap:8px;align-items:flex-start;text-transform:none;color:#e8e8e8">
            <input type="radio" name="modalType" value="persistent" class="modal-type-btn selected" checked
              style="width:auto;margin-top:2px">
            <div>
              <div style="font-weight:500;font-size:13px">Stays</div>
              <div style="font-size:11px;color:#9b9b9b;margin-top:2px">Group header remains even after all tasks are
                done</div>
            </div>
          </label>
          <label style="cursor:pointer;display:flex;gap:8px;align-items:flex-start;text-transform:none;color:#e8e8e8">
            <input type="radio" name="modalType" value="ephemeral" class="modal-type-btn"
              style="width:auto;margin-top:2px">
            <div>
              <div style="font-weight:500;font-size:13px">Auto-archive</div>
              <div style="font-size:11px;color:#9b9b9b;margin-top:2px">Moves to Completed automatically when all tasks
                are finished</div>
            </div>
          </label>
        </div>
      </div>
      <div style="display:flex;gap:12px">
        <div class="modal-field" style="flex:1">
          <label>Start Date (optional)</label>
          <input type="date" id="modalStartDate">
        </div>
        <div class="modal-field" style="flex:1">
          <label>Deadline (optional)</label>
          <input type="date" id="modalDeadline">
        </div>
      </div>
      <div class="modal-actions">
        <button class="modal-cancel" id="modalCancel">Cancel</button>
        <button class="modal-create" id="modalCreate">Create</button>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="quickAddTaskModal">
    <div class="modal">
      <h3>Quick Add Task</h3>
      <div class="modal-field">
        <label>Task Name</label>
        <input type="text" id="qtName" placeholder="What needs to be done?">
      </div>
      <div class="modal-field">
        <label>Add to List or Toggle</label>
        <div id="qtSelectorWrap" class="custom-selector-wrap" style="position:relative; width:100%;">
          <div id="qtSelectedDisplay" class="custom-selector-display" data-action="toggle-qt-selector" style="background:#1e1e1e; color:#e8e8e8; border:1px solid #2e2e2e; padding:10px 12px; border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; font-size:14px;">
            <span id="qtSelectedText">Select List or Toggle...</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div id="qtSelectorDropdown" class="custom-selector-dropdown" style="display:none; position:absolute; top:calc(100% + 4px); left:0; right:0; background:#1e1e1e; border:1px solid #2e2e2e; border-radius:6px; z-index:1000; max-height:240px; overflow-y:auto; box-shadow:0 8px 16px rgba(0,0,0,0.6);">
          </div>
        </div>
      </div>
      <div class="modal-field">
        <label>Due Date</label>
        <input type="date" id="qtDate">
      </div>
      <div class="modal-field" style="display:flex; flex-direction:row; align-items:center; gap:10px; padding:4px 0;">
        <input type="checkbox" id="qtImportant" style="width:20px; height:20px; cursor:pointer;">
        <label style="margin:0; cursor:pointer; text-transform:none;">Mark as Important</label>
      </div>
      <div class="modal-actions">
        <button class="modal-cancel" id="qtCancel">Cancel</button>
        <button class="modal-create" id="qtCreate">Create Task</button>
      </div>
    </div>
  </div>


  <div class="cal-popup" id="calPopup">
    <div class="cp-close" id="calPopupClose">×</div>
    <div class="cp-title" id="cpTitle"></div>
    <div class="cp-info" id="cpBread"></div>
    <div class="cp-info" id="cpDate"></div>
  </div>

  <!-- App Scripts -->
  <script src="js/state.js"></script>
  <script src="js/render.js"></script>
  <script src="js/events.js"></script>
</body>

</html>
